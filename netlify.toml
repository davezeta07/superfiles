[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/f/*"
  to = "/f.html?id=:splat"
  status = 200

[[redirects]]
  from = "/panel"
  to = "/dashboard.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
